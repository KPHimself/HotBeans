<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Form | Hot Beans Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
      
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
  <div class="container">
    <a class="navbar-brand" href="Index.html">HotBeans</a>


    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="Index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="About.Html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="Jobs.html">Jobs</a></li>
        <li class="nav-item"><a class="nav-link active" href="Apply.html">Apply Now</a></li>
        <li class="nav-item"><a class="nav-link" href="Team.Html">Team</a></li>
        <li class="nav-item"><a class="nav-link" href="Courses.html">Courses</a></li>
      </ul>
    </div>
  </div>
</nav>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<div class="form-container">
  <h2>Job Application Form</h2>

  <form class="form-grid">

    <div class="form-group">
      <label>Name</label>
      <div class="input-box">
        <i class="fa fa-user"></i>
        <input type="text" placeholder="Enter your name">
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <div class="input-box">
        <i class="fa fa-envelope"></i>
        <input type="email" placeholder="Enter your email">
      </div>
    </div>

    <div class="form-group">
      <label>Position</label>
      <div class="input-box">
        <i class="fa fa-briefcase"></i>
        <select>
          <option>Junior Web Developer</option>
          <option>Frontend Developer</option>
          <option>Backend Developer</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Phone</label>
      <div class="input-box">
        <i class="fa fa-phone"></i>
        <input type="tel" placeholder="Enter your phone">
      </div>
    </div>

    <div class="form-group full-width">
      <label>Message</label>
      <div class="input-box">
        <i class="fa fa-comment"></i>
        <textarea rows="4" placeholder="Write your message..."></textarea>
      </div>
    </div>

    <div class="full-width">
      <button type="submit">Submit Application</button>
    </div>

  </form>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-container">

    <div>
      <h4>Hot Beans</h4>
      <p>Connecting talented developers with exciting opportunities</p>
    </div>

    <div>
      <h4>Quick Links</h4>
      <p><a href="Index.html" style="color: white;">Home</a></p>
      <p><a href="Jobs.html" style="color: white;">Jobs</a></p>
      <p><a href="About.Html" style="color: white;">About</a></p>
    </div>

    <div>
      <h4>Contact</h4>
      <p>Email: info@hotbeans.com</p>
      <p>Phone: +44 123 456 789</p>
    </div>

  </div>
</footer>

<style>

/* Navbar background */
.navbar-custom {
  background: linear-gradient(90deg, #1e3c72, #2a5298);
  padding: 12px 0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Brand (logo text) */
.navbar-brand {
  font-weight: 600;
  font-size: 1.4rem;
  letter-spacing: 0.5px;
}

/* Nav links */
.nav-link {
  color: #e0e6f0 !important;
  margin-left: 10px;
  position: relative;
  transition: 0.3s ease;
}

/* Hover lift */
.nav-link:hover {
  color: #ffffff !important;
  transform: translateY(-2px);
}

/* Animated underline */
.nav-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 2px;
  width: 0%;
  height: 2px;
  background: white;
  transition: 0.3s ease;
}

/* Hover + active underline */
.nav-link:hover::after,
.nav-link.active::after {
  width: 100%;
}

/* Active link */
.nav-link.active {
  color: #ffffff !important;
  font-weight: 500;
}

/* Mobile toggle button fix */
.navbar-toggler {
  border: none;
}

.navbar-toggler:focus {
  box-shadow: none;
}

/* Page background */
body {
  background: #f5f7fb;
  font-family: 'Segoe UI', sans-serif;
}

/* Center the form */
.form-container {
  max-width: 600px;
  margin: 60px auto;
  background: #ffffff;
  padding: 30px 35px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* Title */
.form-container h2 {
  text-align: center;
  margin-bottom: 25px;
  font-weight: 600;
  color: #1e2a38;
}

/* Grid layout */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* Full width elements */
.full-width {
  grid-column: span 2;
}

/* Labels */
.form-group label {
  font-size: 0.9rem;
  margin-bottom: 5px;
  display: block;
  color: #444;
}

/* Input wrapper */
.input-box {
  position: relative;
}

/* Icons */
.input-box i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #888;
}

/* Inputs */
.input-box input,
.input-box select,
.input-box textarea {
  width: 100%;
  padding: 10px 12px 10px 38px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
  font-size: 0.95rem;
}

/* Textarea fix */
.input-box textarea {
  resize: none;
}

/* Focus effect */
.input-box input:focus,
.input-box select:focus,
.input-box textarea:focus {
  border-color: #2a5298;
  box-shadow: 0 0 0 2px rgba(42,82,152,0.15);
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #1e3c72, #2a5298);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s;
}

/* Button hover */
button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

/* FOOTER */
.footer {
  background: #111827;
  color: white;
  padding: 40px 0;
}

.footer-container {
  width: 90%;
  margin: auto;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 30px;
}

.footer h4 {
  margin-bottom: 10px;
}

/* Responsive */
@media (max-width: 600px) {
  .form-grid {
    grid-template-columns: 1fr;
  }

  .full-width {
    grid-column: span 1;
  }
}

</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
